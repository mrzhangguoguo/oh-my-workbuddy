name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Frontmatter validation
        run: npm run validate
      - name: Catalog drift check
        run: npm run verify-catalog
      - name: Unit tests
        run: npm test
